<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuoteSprint – Home</title>

  <!-- Google Fonts: Orbitron for the logo/display, Rajdhani for UI labels, Roboto Mono for monospace text -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-home">

  <!-- ─── NAVBAR ─────────────────────────────────────────────────── -->
  <header class="navbar">
    <a href="home.html" class="navbar__logo" aria-label="QuoteSprint home">
      <!-- Logo icon: two overlapping speech-bubble lines  -->
      <svg class="navbar__logo-icon" viewBox="0 0 40 28" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="36" height="18" rx="4" stroke="currentColor" stroke-width="2.5"/>
        <line x1="9" y1="8" x2="31" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="9" y1="14" x2="22" y2="14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10 20 L6 26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="navbar__logo-text">
        <span class="navbar__logo-quote">Quote</span><span class="navbar__logo-sprint">Sprint</span>
      </span>
    </a>

    <!-- Mobile hamburger (hidden on desktop) -->
    <button class="navbar__hamburger" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="navbar__nav" id="mainNav" aria-label="Main navigation">
      <ul class="navbar__links">
        <li><a href="home.html" class="navbar__link navbar__link--active">Home</a></li>
        <li><a href="#"        class="navbar__link">Scores</a></li>
        <li><a href="#"        class="navbar__link">About</a></li>
      </ul>
      <a href="typing.html" class="btn btn--primary navbar__cta">PLAY</a>
    </nav>
  </header>
  <!-- ─────────────────────────────────────────────────────────────── -->

  <!-- ─── MAIN CONTENT ─────────────────────────────────────────────── -->
  <main class="home-main">

    <section class="home-hero" aria-labelledby="heroHeading">
      <h1 id="heroHeading" class="home-hero__heading">See where the words take you.</h1>
      <p class="home-hero__subheading">Customize your round before you begin.</p>
    </section>

    <!-- Settings card -->
    <section class="home-settings" aria-label="Game settings">
      <div class="settings-card">

        <!-- Difficulty -->
        <div class="settings-card__row">
          <label class="settings-card__label" for="difficultySelect">Difficulty</label>
          <div class="settings-card__select-wrapper">
            <select class="settings-card__select" id="difficultySelect" name="difficulty">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
            <!-- Chevron icon rendered via CSS/pseudo-element or replaced by your CSS person -->
          </div>
        </div>

        <!-- Length -->
        <div class="settings-card__row">
          <label class="settings-card__label" for="lengthSelect">Length</label>
          <div class="settings-card__select-wrapper">
            <select class="settings-card__select" id="lengthSelect" name="length">
              <option value="short">Short</option>
              <option value="medium">Medium</option>
              <option value="long">Long</option>
            </select>
          </div>
        </div>

        <!-- Category -->
        <div class="settings-card__row">
          <label class="settings-card__label" for="categorySelect">Category</label>
          <div class="settings-card__select-wrapper">
            <select class="settings-card__select" id="categorySelect" name="category">
              <option value="motivational">Motivational</option>
              <option value="wisdom">Wisdom</option>
              <option value="humor">Humor</option>
              <option value="literature">Literature</option>
              <option value="science">Science</option>
            </select>
          </div>
        </div>

        <!-- Start button -->
        <div class="settings-card__action">
          <button class="btn btn--primary btn--wide" id="startBtn" type="button">
            Start Typing
          </button>
        </div>

      </div><!-- /settings-card -->
    </section>

  </main>
  <!-- ─────────────────────────────────────────────────────────────── -->

  <script>
    
  </script>

</body>
</html>
